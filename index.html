<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bolt & Build</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    margin-top: 10px;
    color: #00e5ff;
  }

  #gameArea {
    position: relative;
    width: 100vw;
    height: 80vh;
  }

  .bolt {
    position: absolute;
    width: 50px;
    height: 50px;
    background: gray;
    border-radius: 50%;
    border: 3px solid silver;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: transform 0.2s;
  }

  .bolt:active {
    transform: scale(0.8) rotate(20deg);
  }

  #hud {
    margin-top: 10px;
    font-size: 20px;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🔩 Bolt & Build</h1>

<div id="hud">
  Time: <span id="time">60</span> | Score: <span id="score">0</span>
</div>

<button onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<script>
let time = 60;
let score = 0;
let gameRunning = false;

function startGame() {
  time = 60;
  score = 0;
  gameRunning = true;
  document.getElementById("score").textContent = score;
  document.getElementById("time").textContent = time;
  document.getElementById("gameArea").innerHTML = "";

  spawnBolts();

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").textContent = time;

    if (time <= 0) {
      clearInterval(timer);
      gameRunning = false;
      alert("Time's up! Your score: " + score);
    }
  }, 1000);
}

function spawnBolts() {
  if (!gameRunning) return;

  let gameArea = document.getElementById("gameArea");

  let bolt = document.createElement("div");
  bolt.className = "bolt";
  bolt.innerHTML = "🔩";

  bolt.style.left = Math.random() * (window.innerWidth - 60) + "px";
  bolt.style.top = Math.random() * (window.innerHeight - 200) + "px";

  bolt.onclick = () => {
    score++;
    document.getElementById("score").textContent = score;
    bolt.remove();
  };

  gameArea.appendChild(bolt);

  setTimeout(spawnBolts, 500); // spawn every 0.5 sec
}
</script>

</body>
</html>
