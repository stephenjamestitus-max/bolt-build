<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolt & Build</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    margin-top: 10px;
    color: #00e5ff;
  }

  #hud {
    font-size: 18px;
    margin: 10px;
  }

  #gameArea {
    position: relative;
    width: 100vw;
    height: 75vh;
  }

  .bolt {
    position: absolute;
    width: 60px;
    height: 60px;
    background: gray;
    border-radius: 50%;
    border: 3px solid silver;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.1s;
  }

  .bolt:active {
    transform: scale(0.8) rotate(20deg);
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🔩 Bolt & Build</h1>

<div id="hud">
  Time: <span id="time">60</span> |
  Score: <span id="score">0</span> |
  Combo: <span id="combo">0</span>
</div>

<button onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<script>
let time = 60;
let score = 0;
let combo = 0;
let gameRunning = false;

let clickSound = new Audio("https://www.soundjay.com/mechanical/sounds/metal-clink-1.mp3");

function startGame() {
  time = 60;
  score = 0;
  combo = 0;
  gameRunning = true;

  document.getElementById("score").textContent = score;
  document.getElementById("time").textContent = time;
  document.getElementById("combo").textContent = combo;
  document.getElementById("gameArea").innerHTML = "";

  spawnBolts();

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").textContent = time;

    if (time <= 0) {
      clearInterval(timer);
      gameRunning = false;

      document.body.innerHTML = `
        <h1>⏱ Time's Up!</h1>
        <h2>Your Score: ${score}</h2>
        <button onclick="location.reload()">Play Again</button>
      `;
    }
  }, 1000);
}

function spawnBolts() {
  if (!gameRunning) return;

  let gameArea = document.getElementById("gameArea");

  let bolt = document.createElement("div");
  bolt.className = "bolt";
  bolt.innerHTML = "🔩";

  bolt.style.left = Math.random() * (window.innerWidth - 70) + "px";
  bolt.style.top = Math.random() * (window.innerHeight - 200) + "px";

  bolt.onclick = () => {
    score += 1 + combo;
    combo++;

    clickSound.currentTime = 0;
    clickSound.play();

    document.getElementById("score").textContent = score;
    document.getElementById("combo").textContent = combo;

    bolt.remove();
  };

  gameArea.appendChild(bolt);

  setTimeout(spawnBolts, 400);
}

// combo reset if idle
setInterval(() => {
  combo = 0;
  document.getElementById("combo").textContent = combo;
}, 2000);
</script>

</body>
</html>
