<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolt & Build</title>

<style>
  body {
    margin: 0;
    background: #0e0e0e;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    margin-top: 10px;
    color: #00e5ff;
    text-shadow: 0 0 10px #00e5ff;
  }

  #hud {
    font-size: 18px;
    margin: 10px;
  }

  #gameArea {
    position: relative;
    width: 100vw;
    height: 75vh;
  }

  .bolt {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #444;
    border-radius: 50%;
    border: 3px solid #aaa;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.1s;
  }

  .bolt:active {
    transform: scale(0.8) rotate(20deg);
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: #00e5ff;
    color: black;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>🔩 Bolt & Build</h1>

<div id="hud">
  Time: <span id="time">60</span> |
  Score: <span id="score">0</span> |
  Combo: <span id="combo">0</span>
</div>

<button onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<script>
let time = 60;
let score = 0;
let combo = 0;
let gameRunning = false;
let spawnSpeed = 500;

// Sound (slight variation trick)
let sounds = [
  new Audio("https://www.soundjay.com/mechanical/sounds/metal-clink-1.mp3"),
  new Audio("https://www.soundjay.com/mechanical/sounds/metal-clink-2.mp3")
];

function playSound() {
  let s = sounds[Math.floor(Math.random() * sounds.length)];
  s.currentTime = 0;
  s.play();
}

function startGame() {
  time = 60;
  score = 0;
  combo = 0;
  spawnSpeed = 500;
  gameRunning = true;

  document.getElementById("score").textContent = score;
  document.getElementById("time").textContent = time;
  document.getElementById("combo").textContent = combo;
  document.getElementById("gameArea").innerHTML = "";

  spawnBolts();

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").textContent = time;

    // increase difficulty
    spawnSpeed = Math.max(150, spawnSpeed - 5);

    if (time <= 0) {
      clearInterval(timer);
      gameRunning = false;

      let message = "";
      if (score < 40) message = "😅 You can do better...";
      else if (score < 80) message = "🔥 Solid reflexes!";
      else message = "⚡ Elite speed! Top 1%!";

      document.body.innerHTML = `
        <h1>⏱ Time's Up!</h1>
        <h2>Your Score: ${score}</h2>
        <p>${message}</p>
        <button onclick="location.reload()">Play Again</button>
      `;
    }
  }, 1000);
}

function spawnBolts() {
  if (!gameRunning) return;

  let gameArea = document.getElementById("gameArea");

  let bolt = document.createElement("div");
  bolt.className = "bolt";
  bolt.innerHTML = "🔩";

  // mobile-friendly spawn zone (center bias)
  let x = Math.random() * (window.innerWidth * 0.8) + (window.innerWidth * 0.1);
  let y = Math.random() * (window.innerHeight * 0.5) + (window.innerHeight * 0.2);

  bolt.style.left = x + "px";
  bolt.style.top = y + "px";

  bolt.onclick = () => {
    score += 1 + combo;
    combo++;

    playSound();

    document.getElementById("score").textContent = score;
    document.getElementById("combo").textContent = combo;

    bolt.remove();
  };

  gameArea.appendChild(bolt);

  setTimeout(spawnBolts, spawnSpeed);
}

// reset combo if idle
setInterval(() => {
  combo = 0;
  document.getElementById("combo").textContent = combo;
}, 2000);
</script>

</body>
</html>
